name: Builder

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  repository_dispatch:
    types: [automated-pr-created]
  workflow_dispatch:
    inputs:
      addon:
        description: 'App to build (or "all")'
        required: true
        type: string

jobs:
  init:
    runs-on: ubuntu-latest
    name: Initialize build
    outputs:
      changed_addons: ${{ steps.changed_addons.outputs.addons }}
      changed: ${{ steps.changed_addons.outputs.changed }}
      all_addons: ${{ steps.all_addons.outputs.addons }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'repository_dispatch' && github.event.client_payload.head_sha || '' }}
          fetch-depth: 0

      - name: Discover all apps
        id: all_addons
        run: |
          # Dynamically find all app directories (those with config.yaml)
          declare -a all_addons
          for config in */config.yaml; do
            addon_dir=$(dirname "$config")
            # Skip hidden directories and non-app directories
            if [[ ! "$addon_dir" =~ ^\. ]]; then
              all_addons+=("$addon_dir")
              echo "Found app: $addon_dir"
            fi
          done

          # Create JSON array of all apps
          addons_json=$(printf '%s\n' "${all_addons[@]}" | jq -R . | jq -sc '.')
          echo "addons=${addons_json}" >> "$GITHUB_OUTPUT"
          echo "All apps: ${addons_json}"

      - name: Find changed apps
        id: changed_addons
        run: |
          declare -a changed_addons

          # For manual dispatch or repository_dispatch, use the specified app
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            DISPATCH_ADDON="${{ github.event.inputs.addon }}"
            echo "Triggered manually for app: ${DISPATCH_ADDON}"
          elif [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            DISPATCH_ADDON="${{ github.event.client_payload.addon }}"
            echo "Triggered via repository_dispatch for app: ${DISPATCH_ADDON}"
          fi

          if [ "${{ github.event_name }}" = "workflow_dispatch" ] || [ "${{ github.event_name }}" = "repository_dispatch" ]; then

            if [ "${DISPATCH_ADDON}" = "all" ]; then
              for config in */config.yaml; do
                addon_dir=$(dirname "$config")
                if [[ ! "$addon_dir" =~ ^\. ]]; then
                  changed_addons+=("\"${addon_dir}\"")
                  echo "Building app: $addon_dir"
                fi
              done
            else
              changed_addons+=("\"${DISPATCH_ADDON}\"")
              echo "Building app: ${DISPATCH_ADDON}"
            fi

          elif [ "${{ github.event_name }}" = "pull_request" ]; then
            # For PRs, diff against the base branch
            BASE_REF="${{ github.base_ref }}"
            git fetch origin "${BASE_REF}"
            CHANGED_FILES=$(git diff --name-only "origin/${BASE_REF}...HEAD")
            echo "Changed files vs ${BASE_REF}:"
            echo "$CHANGED_FILES"

            for config in */config.yaml; do
              addon_dir=$(dirname "$config")
              if [[ ! "$addon_dir" =~ ^\. ]]; then
                if echo "$CHANGED_FILES" | grep -q "^${addon_dir}/"; then
                  changed_addons+=("\"${addon_dir}\"")
                  echo "App changed: $addon_dir"
                fi
              fi
            done

          elif [ "${{ github.event_name }}" = "push" ]; then
            # For pushes to main/master, diff against the previous commit
            BEFORE="${{ github.event.before }}"
            if [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
              echo "Initial push, building all apps"
              for config in */config.yaml; do
                addon_dir=$(dirname "$config")
                if [[ ! "$addon_dir" =~ ^\. ]]; then
                  changed_addons+=("\"${addon_dir}\"")
                fi
              done
            else
              CHANGED_FILES=$(git diff --name-only "${BEFORE}...HEAD")
              echo "Changed files since ${BEFORE}:"
              echo "$CHANGED_FILES"

              for config in */config.yaml; do
                addon_dir=$(dirname "$config")
                if [[ ! "$addon_dir" =~ ^\. ]]; then
                  if echo "$CHANGED_FILES" | grep -q "^${addon_dir}/"; then
                    changed_addons+=("\"${addon_dir}\"")
                    echo "App changed: $addon_dir"
                  fi
                fi
              done
            fi
          fi

          # Fallback: if no app-specific changes detected, skip building
          if [[ ${#changed_addons[@]} -eq 0 ]]; then
            echo "No app-specific changes detected, skipping builds"
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo 'addons=[]' >> "$GITHUB_OUTPUT"
          else
            changed=$(echo ${changed_addons[@]} | jq -sc '.')
            echo "addons=${changed}" >> "$GITHUB_OUTPUT"
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

          echo "Changed apps: $(echo ${changed_addons[@]} | jq -sc '.')"

  build:
    needs: init
    runs-on: ubuntu-latest
    if: needs.init.outputs.changed == 'true'
    name: Build ${{ matrix.addon }} app
    strategy:
      matrix:
        addon: ${{ fromJson(needs.init.outputs.changed_addons) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'repository_dispatch' && github.event.client_payload.head_sha || '' }}

      - name: Get build config
        id: config
        run: |
          ADDON="${{ matrix.addon }}"
          VERSION=$(grep "^version:" "${ADDON}/config.yaml" | sed 's/version: *"\(.*\)"/\1/')

          # Read architectures from config.yaml
          ARCHS=$(grep -A10 "^arch:" "${ADDON}/config.yaml" | grep "^\s*-" | sed 's/.*- //' | tr '\n' ' ')
          echo "Architectures: ${ARCHS}"

          # Try amd64 first (native on CI runner), fall back to aarch64
          BASE_IMAGE=$(grep "amd64:" "${ADDON}/build.yaml" | head -1 | awk '{print $2}')
          BUILD_ARCH="amd64"
          if [ -z "${BASE_IMAGE}" ]; then
            BASE_IMAGE=$(grep "aarch64:" "${ADDON}/build.yaml" | head -1 | awk '{print $2}')
            BUILD_ARCH="aarch64"
          fi

          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "base_image=${BASE_IMAGE}" >> $GITHUB_OUTPUT
          echo "build_arch=${BUILD_ARCH}" >> $GITHUB_OUTPUT

      - name: Set up QEMU
        if: steps.config.outputs.build_arch != 'amd64'
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build ${{ matrix.addon }} (test mode)
        run: |
          ADDON="${{ matrix.addon }}"

          # Extract version ARG from build.yaml (e.g., DOCKHAND_VERSION, ARCANE_VERSION)
          VERSION_ARG=$(grep -E '_VERSION:' "${ADDON}/build.yaml" | head -1 | awk -F: '{print $1}' | xargs)
          VERSION_VAL=$(grep -E '_VERSION:' "${ADDON}/build.yaml" | head -1 | awk -F: '{print $2}' | xargs)

          BUILD_ARGS=(
            --build-arg "BUILD_FROM=${{ steps.config.outputs.base_image }}"
            --build-arg "BUILD_ARCH=${{ steps.config.outputs.build_arch }}"
            --build-arg "BUILD_VERSION=${{ steps.config.outputs.version }}"
            --build-arg "BUILD_NAME=${ADDON}"
            --build-arg "BUILD_DESCRIPTION=Test build"
            --build-arg "BUILD_REF=$(git rev-parse --short HEAD)"
            --build-arg "BUILD_REPOSITORY=${{ github.repository }}"
            --build-arg "BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          )

          if [ -n "${VERSION_ARG}" ] && [ -n "${VERSION_VAL}" ]; then
            BUILD_ARGS+=(--build-arg "${VERSION_ARG}=${VERSION_VAL}")
          fi

          PLATFORM_ARGS=()
          if [ "${{ steps.config.outputs.build_arch }}" != "amd64" ]; then
            PLATFORM_ARGS=(--platform "linux/arm64")
          fi

          echo "Building ${ADDON} (${{ steps.config.outputs.build_arch }})..."
          docker buildx build \
            "${PLATFORM_ARGS[@]}" \
            "${BUILD_ARGS[@]}" \
            --load \
            -t "test/${ADDON}:${{ steps.config.outputs.version }}" \
            "./${ADDON}"

          echo "Build successful: test/${ADDON}:${{ steps.config.outputs.version }}"

  smoke-test:
    needs: [init, build]
    runs-on: ubuntu-latest
    if: needs.init.outputs.changed == 'true'
    name: Smoke test ${{ matrix.addon }}
    strategy:
      fail-fast: false
      matrix:
        addon: ${{ fromJson(needs.init.outputs.changed_addons) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'repository_dispatch' && github.event.client_payload.head_sha || '' }}

      - name: Get build config
        id: config
        run: |
          ADDON="${{ matrix.addon }}"
          VERSION=$(grep "^version:" "${ADDON}/config.yaml" | sed 's/version: *"\(.*\)"/\1/')

          # Try amd64 first (native on CI runner), fall back to aarch64
          BASE_IMAGE=$(grep "amd64:" "${ADDON}/build.yaml" | head -1 | awk '{print $2}')
          BUILD_ARCH="amd64"
          PLATFORM="linux/amd64"
          if [ -z "${BASE_IMAGE}" ]; then
            BASE_IMAGE=$(grep "aarch64:" "${ADDON}/build.yaml" | head -1 | awk '{print $2}')
            BUILD_ARCH="aarch64"
            PLATFORM="linux/arm64"
            echo "No amd64 base image found, using aarch64 with QEMU"
          fi

          IMAGE_TAG="smoke-test/${ADDON}:${VERSION}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "base_image=${BASE_IMAGE}" >> $GITHUB_OUTPUT
          echo "build_arch=${BUILD_ARCH}" >> $GITHUB_OUTPUT
          echo "platform=${PLATFORM}" >> $GITHUB_OUTPUT
          echo "image_tag=${IMAGE_TAG}" >> $GITHUB_OUTPUT

      - name: Set up QEMU
        if: steps.config.outputs.build_arch != 'amd64'
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        if: steps.config.outputs.build_arch != 'amd64'
        uses: docker/setup-buildx-action@v4

      - name: Build image for smoke test
        run: |
          ADDON="${{ matrix.addon }}"

          # Extract the version ARG name from build.yaml (e.g., MUNINNDB_VERSION, ARCANE_VERSION)
          VERSION_ARG=$(grep -E '_VERSION:' "${ADDON}/build.yaml" | head -1 | awk -F: '{print $1}' | xargs)
          VERSION_VAL=$(grep -E '_VERSION:' "${ADDON}/build.yaml" | head -1 | awk -F: '{print $2}' | xargs)

          BUILD_ARGS=(
            --build-arg "BUILD_FROM=${{ steps.config.outputs.base_image }}"
            --build-arg "BUILD_ARCH=${{ steps.config.outputs.build_arch }}"
            --build-arg "BUILD_VERSION=${{ steps.config.outputs.version }}"
            --build-arg "BUILD_NAME=${ADDON}"
            --build-arg "BUILD_DESCRIPTION=Smoke test"
            --build-arg "BUILD_REF=$(git rev-parse --short HEAD)"
            --build-arg "BUILD_REPOSITORY=local"
            --build-arg "BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            --build-arg "TARGETARCH=${{ steps.config.outputs.build_arch }}"
          )

          if [ -n "${VERSION_ARG}" ] && [ -n "${VERSION_VAL}" ]; then
            BUILD_ARGS+=(--build-arg "${VERSION_ARG}=${VERSION_VAL}")
          fi

          # Use --platform for cross-arch builds, --load to make image available locally
          PLATFORM_ARGS=()
          if [ "${{ steps.config.outputs.build_arch }}" != "amd64" ]; then
            PLATFORM_ARGS=(--platform "${{ steps.config.outputs.platform }}" --load)
          fi

          echo "Building ${ADDON} for smoke test (${{ steps.config.outputs.build_arch }})..."
          docker buildx build \
            "${PLATFORM_ARGS[@]}" \
            "${BUILD_ARGS[@]}" \
            -t "${{ steps.config.outputs.image_tag }}" \
            "./${ADDON}"

      - name: Run smoke test
        run: |
          IMAGE_NAME="${{ steps.config.outputs.image_tag }}" \
            bash .github/scripts/smoke-test.sh \
            "${{ matrix.addon }}" \
            "${{ steps.config.outputs.image_tag }}"
